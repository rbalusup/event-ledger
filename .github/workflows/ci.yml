name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  account-service:
    name: Account Service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: account-service
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: account-service-test-reports
          path: account-service/build/reports/tests/test
          if-no-files-found: ignore

  event-gateway:
    name: Event Gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: event-gateway
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-gateway-test-reports
          path: event-gateway/build/reports/tests/test
          if-no-files-found: ignore
